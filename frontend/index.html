<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestoraAI - Heritage Restoration</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF5722;
            --primary-glow: rgba(255, 87, 34, 0.4);
            --bg: #030712;
            --card-bg: rgba(30, 41, 59, 0.5);
            --text: #F8FAFC;
            --text-secondary: #94A3B8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 4rem 1rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 87, 34, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(67, 56, 202, 0.15) 0%, transparent 40%);
            z-index: -1;
            animation: bgShift 15s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { transform: scale(1); }
            100% { transform: scale(1.1) translate(20px, -20px); }
        }

        /* Header Section */
        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #FF5722 0%, #FFB74D 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 87, 34, 0.3));
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Glass Container */
        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        inset 0 1px 1px var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInUp 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 500px;
            margin-bottom: 4rem;
        }

        .select-wrapper {
            position: relative;
            width: 100%;
        }

        select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            color: var(--text);
            border: 1px solid var(--glass-border);
            padding: 1.25rem 1.5rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            appearance: none;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: rgba(15, 23, 42, 0.8);
        }

        .select-wrapper::after {
            content: '↓';
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
            font-size: 0.8rem;
        }

        .btn {
            background: linear-gradient(135deg, #FF5722 0%, #E64A19 100%);
            color: white;
            border: none;
            padding: 1.25rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px -5px var(--primary-glow);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 30px -10px var(--primary-glow);
            filter: brightness(1.1);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .btn:disabled {
            background: #334155;
            cursor: not-allowed;
            opacity: 0.7;
            box-shadow: none;
        }

        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2.5rem;
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            visibility: hidden;
        }

        .results-grid.visible {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        .image-card {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: transform 0.5s ease;
        }

        .image-wrapper:hover {
            transform: scale(1.02);
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .image-wrapper:hover img {
            transform: scale(1.1);
        }

        /* Badges */
        .badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #fff;
            z-index: 10;
        }

        .label {
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        /* Modern Loader */
        .loader {
            display: none;
            position: relative;
            width: 60px;
            height: 60px;
            margin-bottom: 2rem;
        }

        .loader::before, .loader::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--primary);
            animation: sweep 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .loader::after {
            border-top-color: #FFB74D;
            animation-delay: -0.6s;
        }

        @keyframes sweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 2rem 1rem; }
            .container { padding: 1.5rem; }
            .results-grid { grid-template-columns: 1fr; gap: 2rem; }
            h1 { font-size: 3rem; }
            .controls { margin-bottom: 2rem; }
        }

    </style>
</head>

<body>
    <header>
        <h1>RestoraAI</h1>
        <p class="subtitle">AI-powered restoration of historical monuments. Breathe life back into heritage.</p>
    </header>

    <div class="container">
        <div class="controls">
            <div class="select-wrapper">
                <select id="distortedSelect">
                    <option value="" disabled selected>Select monument image...</option>
                </select>
            </div>
            <button id="restoreBtn" class="btn">
                <span>Run Restoration</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </div>

        <div id="loader" class="loader"></div>

        <div id="resultsGrid" class="results-grid">
            <div class="image-card">
                <div class="image-wrapper">
                    <span class="badge">Before</span>
                    <img id="distortedImg" src="" alt="Distorted Input">
                </div>
                <div class="label">Distorted Input</div>
            </div>
            <div class="image-card">
                <div class="image-wrapper">
                    <span class="badge" style="border-color: var(--primary); color: var(--primary);">Restored</span>
                    <img id="restoredImg" src="" alt="Restored Output">
                </div>
                <div class="label">Restored Heritage</div>
            </div>
        </div>
    </div>

    <script>
        const distortedSelect = document.getElementById('distortedSelect');
        const restoreBtn = document.getElementById('restoreBtn');
        const resultsGrid = document.getElementById('resultsGrid');
        const loader = document.getElementById('loader');

        // Populate dropdown on load
        async function loadList() {
            try {
                const response = await fetch('/api/list_distorted');
                const list = await response.json();
                list.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item;
                    opt.textContent = item;
                    distortedSelect.appendChild(opt);
                });
            } catch (e) {
                console.error('Failed to load image list', e);
            }
        }

        restoreBtn.addEventListener('click', async () => {
            const selected = distortedSelect.value;
            if (!selected) {
                alert('Please select an image first.');
                return;
            }

            restoreBtn.disabled = true;
            resultsGrid.classList.remove('visible');
            setTimeout(() => {
                if (!resultsGrid.classList.contains('visible')) {
                    resultsGrid.style.display = 'none';
                }
            }, 500);
            
            loader.style.display = 'block';

            try {
                const response = await fetch(`/api/restore_selected/${selected}`);
                const data = await response.json();

                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    document.getElementById('distortedImg').src = data.distorted;
                    document.getElementById('restoredImg').src = data.restored;
                    
                    // Small delay to ensure images start loading before showing
                    setTimeout(() => {
                        resultsGrid.style.display = 'grid';
                        // Force reflow
                        resultsGrid.offsetHeight;
                        resultsGrid.classList.add('visible');
                    }, 100);
                }
            } catch (error) {
                alert('Backend connection failed.');
            } finally {
                restoreBtn.disabled = false;
                loader.style.display = 'none';
            }
        });

        loadList();
    </script>
</body>

</html>
